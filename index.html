<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #080a0f;
      --deep: #0d1117;
      --panel: #111620;
      --border: rgba(255,255,255,0.07);
      --gold: #c9a84c;
      --gold-dim: rgba(201,168,76,0.15);
      --white: #f0eeea;
      --muted: #7a8399;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 80px;
      overflow-x: hidden;
    }

    /* ── Header ── */
    header {
      width: 100%;
      padding: 36px 48px 24px;
      display: flex;
      align-items: baseline;
      gap: 18px;
      border-bottom: 1px solid var(--border);
      animation: fadeDown 0.8s ease both;
    }

    .site-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--white);
    }

    .date-badge {
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-left: auto;
    }

    /* ── About ── */
    .about-section {
      width: 100%;
      border-bottom: 1px solid var(--border);
      animation: fadeDown 0.8s ease 0.1s both;
    }

    .about-card {
      padding: 20px 48px 24px;
    }

    .about-card p {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(1.1rem, 2vw, 1.4rem);
      font-weight: 300;
      font-style: italic;
      color: var(--white);
      line-height: 1.6;
    }

    .about-card a {
      display: inline-block;
      margin-top: 20px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      text-decoration: none;
      border-bottom: 1px solid rgba(201,168,76,0.3);
      padding-bottom: 2px;
      transition: border-color 0.2s;
    }

    .about-card a:hover {
      border-color: var(--gold);
    }

    /* ── Main Card ── */
    main {
      width: min(900px, 94vw);
      margin-top: 56px;
      animation: fadeUp 1s ease 0.2s both;
    }

    .label {
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Image wrapper */
    .image-frame {
      position: relative;
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .image-frame::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, rgba(201,168,76,0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 1;
    }

    #apod-image {
      width: 100%;
      display: block;
      max-height: 600px;
      object-fit: cover;
      transition: transform 0.6s ease;
    }

    .image-frame:hover #apod-image {
      transform: scale(1.015);
    }

    #apod-video-container {
      display: none;
      width: 100%;
      aspect-ratio: 16/9;
    }
    #apod-video-container iframe {
      width: 100%; height: 100%; border: none;
    }

    /* Info bar */
    .info-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 24px;
      padding: 22px 0 0;
      flex-wrap: wrap;
    }

    #apod-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 300;
      line-height: 1.2;
      color: var(--white);
    }

    #apod-credit {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
      white-space: nowrap;
      padding-top: 6px;
    }

    /* Loading state */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 320px;
      gap: 18px;
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 1px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    /* Error */
    .error-box {
      padding: 40px;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      line-height: 1.8;
    }
    .error-box strong { color: var(--white); display: block; margin-bottom: 8px; font-size: 1rem; }

    /* Animations */
    @keyframes fadeDown { from { opacity:0; transform: translateY(-14px); } to { opacity:1; transform: none; } }
    @keyframes fadeUp   { from { opacity:0; transform: translateY(20px);  } to { opacity:1; transform: none; } }
    @keyframes spin     { to { transform: rotate(360deg); } }

    /* ── Quote Section ── */
    .quote-section {
      width: min(900px, 94vw);
      margin: 56px auto 0;
      animation: fadeUp 1s ease 0.5s both;
    }

    .quote-card {
      border: 1px solid var(--border);
      background: var(--panel);
      padding: 48px 52px;
      position: relative;
      overflow: hidden;
    }

    .quote-card::before {
      content: '\201C';
      position: absolute;
      top: -10px;
      left: 32px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10rem;
      color: var(--gold-dim);
      line-height: 1;
      pointer-events: none;
    }

    .quote-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(1.25rem, 2.5vw, 1.75rem);
      font-weight: 300;
      font-style: italic;
      line-height: 1.6;
      color: var(--white);
      position: relative;
      z-index: 1;
    }

    .quote-author {
      margin-top: 24px;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
    }

    /* Responsive */
    @media (max-width: 600px) {
      header { padding: 24px 20px 18px; flex-wrap: wrap; }
      .date-badge { width: 100%; margin-left: 0; }
      .quote-card { padding: 32px 28px; }
      .about-card { padding: 16px 20px 20px; }
    }
  </style>
</head>

    document.getElementById('site-date').textContent = `${dd}.${mm}.${yyyy}`;

    const dateEl = document.getElementById('today-date');

    // Fetch from NASA APOD API
    async function loadAPOD() {
      const API_KEY = 'LmOpaZVEPNLdNoehcwe6vBMFB0M2Z0bfu1HSC83m';
      const url = `https://api.nasa.gov/planetary/apod?api_key=${API_KEY}`;

      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        document.getElementById('loading').style.display = 'none';
        document.getElementById('apod-title').textContent = data.title || '';

        if (data.copyright) {
          document.getElementById('apod-credit').textContent =
            `© ${data.copyright.replace(/\n/g, ' ')}`;
        }

        if (data.media_type === 'video') {
          const vc = document.getElementById('apod-video-container');
          vc.style.display = 'block';
          const isEmbed = /youtube\.com|youtu\.be|vimeo\.com/.test(data.url);
          if (isEmbed) {
            vc.innerHTML = `<iframe src="${data.url}" allowfullscreen></iframe>`;
          } else {
            vc.innerHTML = `<video src="${data.url}" controls autoplay muted loop style="width:100%;height:100%;"></video>`;
          }
        } else {
          const img = document.getElementById('apod-image');
          img.src = data.hdurl || data.url;
          img.alt = data.title;
          img.style.display = 'block';
        }

      } catch (err) {
        document.getElementById('loading').innerHTML = `
          <div class="error-box">
            <strong>Could not load today's image</strong>
            Check your internet connection or API key.<br/>
            Error: ${err.message}
          </div>`;
      }
    }

      { text: "What you seek is seeking you.", author: "Rumi" },
      { text: "Yesterday I was clever, so I wanted to change the world. Today I am wise, so I am changing myself.", author: "Rumi" },
      { text: "Raise your words, not voice. It is rain that grows flowers, not thunder.", author: "Rumi" },
      { text: "The wound is the place where the light enters you.", author: "Rumi" },
      { text: "Ignore those that make you fearful and sad, that degrade you back towards disease and death.", author: "Rumi" },
      { text: "Start a huge, foolish project, like Noah. It makes absolutely no difference what people think of you.", author: "Rumi" },
      { text: "When you do things from your soul, you feel a river moving in you, a joy.", author: "Rumi" },
      { text: "Sell your cleverness and buy bewilderment.", author: "Rumi" },
      { text: "Try not to resist the changes that come your way. Instead, let life live through you.", author: "Rumi" },

      { text: "Put your thoughts to sleep, do not let them cast a shadow over the moon of your heart.", author: "Rumi" },
    ];

    function loadQuote() {
      const now = new Date();
      const start = new Date(now.getFullYear(), 0, 0);
      const diff = now - start;
      const oneDay = 1000 * 60 * 60 * 24;
      const dayOfYear = Math.floor(diff / oneDay);
      const q = quotes[dayOfYear % quotes.length];
      document.getElementById('quote-text').textContent = q.text;
      document.getElementById('quote-author').textContent = '— ' + q.author;
    }

    loadQuote();
  </script>
